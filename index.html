<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Mind Map</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- pdf-lib for high-resolution client-side PDF generation -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="toolbar-left">
        <button id="newMapBtn">New tab</button>
        <select id="mapSelect"></select>
        <button id="openMapBtn">Open in new tab</button>
        <button id="saveMapBtn">Save</button>
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
      </div>
      <div class="toolbar-right">
        <button id="addNodeBtn">Add node</button>
        <button id="deleteNodeBtn">Delete node</button>
        <button id="autoFitBtn">Auto-fit</button>
      </div>
    </header>

    <div id="tabBar" class="tab-bar" aria-label="Open mind maps"></div>

    <main class="main-layout">
      <section class="side-panel" aria-label="Settings">
        <h2>Settings</h2>
        <div class="panel-section">
          <h3>Node style</h3>
          <label>
            Outline colour
            <input type="color" id="nodeBorderColorInput" value="#e5e7eb" />
          </label>
          <label>
            Fill colour
            <input type="color" id="nodeFillColorInput" value="#facc15" />
          </label>
          <label>
            Text colour
            <input type="color" id="nodeTextColorInput" value="#111827" />
          </label>
          <label>
            Connector colour
            <input type="color" id="connectionColorInput" value="#9ca3af" />
          </label>
          <label>
            Font size (px)
            <input type="number" id="fontSizeInput" min="8" max="36" value="16" />
          </label>
          <label>
            Connector style
            <select id="connectorStyleSelect">
              <option value="solid">Solid</option>
              <option value="dashed">Dashed</option>
            </select>
          </label>
          <button id="applyNodeStyleToAllBtn" class="secondary small" style="display:none; margin-top:0.75rem;">Apply style to all nodes</button>
        </div>

        <div class="panel-section">
          <h3>Layout</h3>
          <label>
            Layout mode
            <select id="layoutModeSelect">
              <option value="free">Free (manual)</option>
              <option value="radial">Radial</option>
              <option value="tree" selected>Tree</option>
              <option value="flow">Left-to-right</option>
            </select>
          </label>
          <label>
            Tree direction
            <select id="treeDirectionSelect">
              <option value="top-down">Top to bottom</option>
              <option value="left-right">Left to right</option>
              <option value="right-left">Right to left</option>
              <option value="bottom-up">Bottom to top</option>
            </select>
          </label>

          <div class="panel-subsection">
            <h4>Advanced</h4>
            <div class="inline-number-row auto-layout-row">
              <span class="label-text">Auto layout every</span>
              <input type="number" id="autoLayoutIntervalInput" min="2" value="10" />
              <span class="suffix">seconds</span>
              <input type="checkbox" id="autoLayoutToggle" checked />
            </div>
          </div>

          <button id="applyLayoutBtn">Apply layout</button>
        </div>
      </section>

      <section class="canvas-wrapper" aria-label="Mind map canvas">
        <canvas id="mindmapCanvas"></canvas>
        <div id="hintOverlay">Double-click a node to edit. Drag nodes to rearrange. Drag background to pan. Scroll or pinch to zoom.</div>
      </section>

      <section class="side-panel" aria-label="Export">
        <h2>Export</h2>
        <div class="panel-section">
          <h3>Format</h3>
          <label>
            Type
            <select id="exportFormatSelect">
              <option value="pdf">PDF</option>
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
              <option value="heif">HEIF</option>
            </select>
          </label>
        </div>
        <div class="panel-section">
          <h3>Quality</h3>
          <label>
            Preset
            <select id="qualitySelect">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="max">Max</option>
            </select>
          </label>
        </div>
        <div class="panel-section">
          <h3>Output size</h3>
          <label>
            Preset
            <select id="sizePresetSelect">
              <option value="screen">Screen size</option>
              <option value="a4">A4</option>
              <option value="a3">A3</option>
              <option value="custom">Custom (px)</option>
            </select>
          </label>
          <div class="custom-size-row">
            <label>
              Width
              <input type="number" id="customWidthInput" min="200" value="1920" />
            </label>
            <label>
              Height
              <input type="number" id="customHeightInput" min="200" value="1080" />
            </label>
          </div>
        </div>
        <div class="panel-section">
          <button id="exportBtn" class="primary">Download</button>
          <p class="small-note">
            All exports are generated in your browser. Your maps never leave this device.
          </p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
